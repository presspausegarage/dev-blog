{{ define "main" }}

<article class="post-single">
  <div class="post-single-inner">

    <div class="post-single-back">
      <a href="/#devlog">← Back to Devlog</a>
    </div>

    <div class="post-single-meta">
      <span class="post-date">{{ .Date.Format "January 2, 2006" }}</span>
      {{ with .Params.tag }}<span class="post-tag">{{ . }}</span>{{ end }}
    </div>

    <h1 class="post-single-title">{{ .Title }}</h1>

    <div class="post-single-content">
      {{ .Content }}
    </div>

    <div class="post-single-nav">
      {{ with .PrevInSection }}
        <a class="post-nav-link" href="{{ .Permalink }}">← {{ .Title }}</a>
      {{ end }}
      {{ with .NextInSection }}
        <a class="post-nav-link post-nav-next" href="{{ .Permalink }}">{{ .Title }} →</a>
      {{ end }}
    </div>

  </div>
</article>

{{ end }}
