// ─── AUDIO ───────────────────────────────────────────────────
let audioCtx=null, engineOsc=null, engineGain=null, engineOsc2=null;
function initAudio(){
  if(audioCtx)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    engineGain=audioCtx.createGain(); engineGain.gain.value=0; engineGain.connect(audioCtx.destination);
    engineOsc=audioCtx.createOscillator(); engineOsc.type='sawtooth'; engineOsc.frequency.value=80; engineOsc.connect(engineGain);
    engineOsc2=audioCtx.createOscillator(); engineOsc2.type='square'; engineOsc2.frequency.value=40;
    const g2=audioCtx.createGain(); g2.gain.value=0.4; engineOsc2.connect(g2); g2.connect(engineGain);
    engineOsc.start(); engineOsc2.start();
  }catch(e){audioCtx=null;}
}
function setEngineSound(rpm,active){
  if(!audioCtx||!engineGain)return;
  const f=60+(rpm/8000)*320;
  engineOsc.frequency.setTargetAtTime(f,audioCtx.currentTime,0.04);
  engineOsc2.frequency.setTargetAtTime(f/2,audioCtx.currentTime,0.04);
  engineGain.gain.setTargetAtTime(active?0.04:0,audioCtx.currentTime,0.1);
}
function blip(freq,dur,type='square'){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0.12,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function playShift(q){
  if(q==='perfect'){blip(880,0.12);setTimeout(()=>blip(1320,0.08),80);}
  else if(q==='good')blip(660,0.1);
  else blip(220,0.15,'sawtooth');
}
function playNOS(){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination); o.type='sawtooth';
  o.frequency.setValueAtTime(120,audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(400,audioCtx.currentTime+0.3);
  g.gain.setValueAtTime(0.08,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
  o.start();o.stop(audioCtx.currentTime+0.3);
}
function playCash(){blip(440,0.08);setTimeout(()=>blip(554,0.08),80);}
function playWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,0.2),i*120));}
function playLose(){[400,300,200].forEach((f,i)=>setTimeout(()=>blip(f,0.25,'sawtooth'),i*150));}
function playCountBeep(isGo){blip(isGo?880:440,isGo?0.3:0.15);}

// ─── MUSIC ───────────────────────────────────────────────────
let musicNodes=[],musicPlaying=false;
function stopMusic(){musicNodes.forEach(n=>{try{n.stop();}catch(e){}});musicNodes=[];musicPlaying=false;}
function playMusic(){
  if(!audioCtx||musicPlaying)return;
  stopMusic();musicPlaying=true;
  const BPM=172,B=60/BPM,S=B/2;
  const mel=[[330,S,0],[392,S*.5,S],[440,S*.5,S*1.5],[494,S,S*2],[440,S*.5,S*3],[392,S*.5,S*3.5],
    [330,S,S*4],[0,S*.5,S*5],[330,S*.5,S*5.5],[370,S,S*6],[330,S*.5,S*7],[294,S*.5,S*7.5],
    [330,S*.5,S*8],[392,S*.5,S*8.5],[440,S,S*9],[494,S*.5,S*10],[523,S*.5,S*10.5],[587,S,S*11],[523,S*.5,S*12],[494,S*.5,S*12.5],
    [440,S,S*13],[392,S*.5,S*14],[440,S*.5,S*14.5],[494,S*2,S*15],
    [659,S,S*17],[587,S*.5,S*18],[523,S*.5,S*18.5],[494,S,S*19],[440,S*.5,S*20],[392,S*.5,S*20.5],
    [330,S*1.5,S*21],[294,S*.5,S*22.5],[330,S*.5,S*23],[370,S*.5,S*23.5],
    [392,S,S*24],[440,S*.5,S*25],[494,S*.5,S*25.5],[440,S,S*26],[392,S*.5,S*27],[370,S*.5,S*27.5],
    [330,S*3,S*28],[0,S,S*31]];
  const bass=[[82,S*2,0],[98,S*2,S*2],[110,S*2,S*4],[98,S*2,S*6],[82,S*2,S*8],[98,S*2,S*10],[123,S*2,S*12],[110,S*2,S*14],
    [82,S*2,S*16],[98,S*2,S*18],[110,S*2,S*20],[98,S*2,S*22],[82,S*2,S*24],[110,S*2,S*26],[98,S*2,S*28],[82,S*2,S*30]];
  const loopLen=S*32;
  function sched(t0){
    if(!musicPlaying)return;
    mel.forEach(([f,d,off])=>{if(f===0)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='square';o.frequency.value=f;const t=t0+off,t1=t+d*.88;g.gain.setValueAtTime(0.045,t);g.gain.setValueAtTime(0.045,t1-.01);g.gain.linearRampToValueAtTime(0,t1);o.start(t);o.stop(t1);musicNodes.push(o);});
    bass.forEach(([f,d,off])=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sawtooth';o.frequency.value=f;const t=t0+off,t1=t+d*.8;g.gain.setValueAtTime(0.025,t);g.gain.linearRampToValueAtTime(0,t1);o.start(t);o.stop(t1);musicNodes.push(o);});
    setTimeout(()=>sched(t0+loopLen),(loopLen-.5)*1000);
  }
  sched(audioCtx.currentTime+0.05);
}

// ─── RUN INIT ────────────────────────────────────────────────
function initRun(driverId){
  const drv=DRIVERS.find(d=>d.id===driverId)||DRIVERS[0];
  run={
    driver:drv, series:1, raceInSeries:1,
    lives:drv.lives, cash:drv.cash,
    partSlots:drv.slots, parts:[],
    upgrades:[], wins:0, bestSpeed:0,
    jSlots:3, bonusNos:0, discount:0,
    rerollBase:5, sellMult:0.5,
    highStakes:false, scout:false,
  };
  if(drv.startPart){
    const sp=PARTS.find(p=>p.id===drv.startPart);
    if(sp) run.parts.push({...sp});
  }
  if(drv.id==='hot_lips') run.bonusNos+=2;
  particles=[];
}

// ─── BUILD STATS ─────────────────────────────────────────────
function buildStats(){
  const s={
    accel:1.0, topSpeed:1.0, grip:1.0, launchBoost:1.0,
    rpmBuild:1.0, shiftWindow:1.0, rpmFloor:0, rpmRecovery:1.0,
    nosCharges:0+run.bonusNos, nosPower:1.0, nosDur:2.6, nosRamp:false,
    nosDisabled:false, fogger:false,
    cdMult:1.0, perfectSpeedBonus:0,
    weatherImmune:false, forceGoodShift:false, goodIsPerfect:false,
    firstShiftPerfect:false, perfNosBonus:false,
    cashPerPerfect:0, gearCount:6,
  };
  const ps=run.parts;
  ps.forEach(p=>{ if(p&&p.apply) p.apply(s,ps,run); });
  // Category synergies
  const cats={};
  ps.forEach(p=>{if(p)cats[p.cat]=(cats[p.cat]||0)+1;});
  if((cats['ENGINE']||0)>=3){s.accel*=1.10;s.topSpeed*=1.05;}
  // Balanced build bonus (all different cats, 4+ parts)
  const unique=new Set(ps.filter(Boolean).map(p=>p.cat));
  if(unique.size>=4&&ps.filter(Boolean).length>=4){s.accel*=1.05;s.topSpeed*=1.05;}
  return s;
}

// ─── RACE TYPE ───────────────────────────────────────────────
function getRaceType(){return['sprint','quarter','boss'][run.raceInSeries-1];}

// ─── PLAYER FACTORY ──────────────────────────────────────────
function makePlayer(){
  const s=buildStats();
  return {
    dist:0,speed:0,rpm:IDLE_RPM,gear:1,
    ...s,
    nosActive:false,nosFuel:0,
    launched:false,shiftCooldown:0,overrevTimer:0,perfectFlash:0,
    firstShiftDone:false,perfectCount:0,
    color:run.driver.color||'#dd3322', color2:'#881a10',
  };
}

// ─── OPPONENT FACTORY ─────────────────────────────────────────
function makeOpponent(){
  const rt=getRaceType();
  let base=0.60+(run.series-1)*0.095;
  if(rt==='quarter')base+=0.03;
  if(rt==='boss')base+=0.08;
  return {
    dist:0,speed:0,baseSpeed:base,
    gear:1,gearTimer:0,gearInterval:Math.max(1.2,2.8-run.series*0.18),
    headStart:0,
    color:'#2255dd',color2:'#0a2266',
  };
}

// ─── ZONES ───────────────────────────────────────────────────
function getZones(p){
  const center=0.86, hw=0.052*p.shiftWindow, phw=0.018*p.shiftWindow;
  // Drifter: zone wobble
  const w=run.driver.id==='drifter'?Math.sin(frame*0.09)*0.025:0;
  // Crowd boss: zone wobble
  const bossWobble=(getRaceType()==='boss'&&SERIES[run.series-1].boss.name==='The Crowd')?Math.sin(frame*0.15+p.gear)*0.03:0;
  const off=w+bossWobble;
  return{goodMin:center-hw+off,goodMax:center+hw+off,perfMin:center-phw+off,perfMax:center+phw+off};
}

// ─── SETUP RACE ──────────────────────────────────────────────
function setupRace(){
  player=makePlayer();
  opponent=makeOpponent();
  const rt=getRaceType();
  // Boss debuffs
  if(rt==='boss'){
    const db=SERIES[run.series-1]?.boss;
    if(db?.apply) db.apply(player,opponent,run);
  }
  // Weather immunity
  if(player.weatherImmune&&rt==='boss'){
    player.shiftWindow=buildStats().shiftWindow; // restore
    player.grip=buildStats().grip;
  }
  // Oil slick state
  player._oilTimer=0; player._oilActive=false;
  particles=[];trackOffset=0;raceTimer=0;
  race={state:'countdown',finishPlayer:null,finishOpponent:null};
  countdown=3;cdTimer=1;cdFlash=0;
  run.highStakes=false;
  state='countdown';
}

// ─── END RACE ────────────────────────────────────────────────
function endRace(){
  const fp=race.finishPlayer,fo=race.finishOpponent;
  const won=fp!==null&&(fo===null||fp<=fo);
  raceResult=won?'win':'lose';
  const rt=getRaceType();
  let earn=0;
  if(won){
    earn=rt==='sprint'?3:rt==='quarter'?5:8;
    run.wins++;playWin();flash('YOU WIN!',C.neon,2);
  } else {
    run.lives--;playLose();flash('YOU LOSE!',C.red,2);
    if(run.highStakes)run.cash=Math.max(0,run.cash-5);
  }
  run.cash+=earn;
  const interest=Math.min(5,Math.floor(run.cash/5));
  run.cash+=interest;
  setEngineSound(IDLE_RPM,false);
  state='result';resultTimer=2.5;
}

function afterResult(){
  if(run.lives<=0){state='gameover';return;}
  if(run.raceInSeries<3){
    run.raceInSeries++;
    const rt=getRaceType();
    if(rt==='sprint'){sprintChoice=true;state='sprint_prompt';}
    else setupRace();
  } else {
    if(run.series>=8){state='win';return;}
    run.series++;run.raceInSeries=1;
    buildJunkyard();state='junkyard';
  }
}

// ─── PHYSICS ─────────────────────────────────────────────────
function updatePlayer(dt){
  const p=player;
  if(!p.launched)return;
  if(p.shiftCooldown>0)p.shiftCooldown-=dt;
  if(p.perfectFlash>0)p.perfectFlash-=dt;
  if(p.overrevTimer>0){p.overrevTimer-=dt;p.speed=Math.max(0,p.speed-60*dt);}

  // Oil slick boss effect
  if(p._oilTimer!==undefined){
    p._oilTimer-=dt;
    if(p._oilTimer<=0){p._oilActive=!p._oilActive;p._oilTimer=p._oilActive?0.4:2.5+Math.random()*2;}
    if(p._oilActive){p.speed*=0.985;p.rpm=Math.max(IDLE_RPM,p.rpm*0.99);}
  }

  // Fogger auto-NOS
  if(p.fogger&&!p.nosActive&&!p.nosDisabled&&opponent&&opponent.dist>p.dist+40&&p.launched){
    p.nosActive=true;p.nosFuel=1.5;
  }
  if(p.nosActive){p.nosFuel-=dt;if(p.nosFuel<=0){p.nosActive=false;p.nosFuel=0;}}

  let nosBoost=1.0;
  if(p.nosActive){
    if(p.nosRamp){const prog=1-(p.nosFuel/p.nosDur);nosBoost=0.5+prog*1.5*(p.nosPower||1);}
    else nosBoost=1.60*(p.nosPower||1);
  }

  const ratios=[0,3.5,2.6,1.9,1.45,1.15,0.92];
  const gr=ratios[Math.min(p.gear,6)]||1;
  const rpmRate=3200*p.accel*p.rpmBuild/gr;
  if(p.overrevTimer<=0)p.rpm=Math.min(MAX_RPM,p.rpm+rpmRate*dt);

  const gc=p.gearCount||6;
  const gearTopSpd=(p.gear/gc)*310*p.topSpeed;
  const rpmFrac=p.rpm/MAX_RPM;
  const targetSpd=rpmFrac*gearTopSpd;
  p.speed+=(targetSpd-p.speed)*2.8*dt*nosBoost;
  p.speed=Math.max(0,p.speed);

  if(p.rpm>=MAX_RPM&&p.gear<gc&&p.shiftCooldown<=0){
    p.overrevTimer=0.35;p.speed*=0.88;blip(180,0.2,'sawtooth');
  }
  p.dist+=p.speed*dt;
  if(frame%4===0)spawnExhaust(p.nosActive);
  setEngineSound(p.rpm,true);
  if(run.bestSpeed<Math.floor(p.speed))run.bestSpeed=Math.floor(p.speed);
}

function doShift(){
  const p=player;
  if(!p.launched||p.gear>=(p.gearCount||6)||p.shiftCooldown>0)return;
  const rpmFrac=p.rpm/MAX_RPM;
  const z=getZones(p);
  let q;
  if(p.firstShiftPerfect&&!p.firstShiftDone){q='perfect';p.firstShiftDone=true;}
  else if(rpmFrac>=z.perfMin&&rpmFrac<=z.perfMax||p.goodIsPerfect&&rpmFrac>=z.goodMin&&rpmFrac<=z.goodMax)q='perfect';
  else if(rpmFrac>=z.goodMin&&rpmFrac<=z.goodMax)q=p.forceGoodShift?'perfect':'good';
  else if(rpmFrac<z.goodMin)q=p.forceGoodShift?'good':'early';
  else q=p.forceGoodShift?'good':'late';

  const floor=p.rpmFloor||0;
  const base=0.25*(p.cdMult||1);
  p.gear++;
  if(q==='perfect'){
    p.rpm=Math.max(MAX_RPM*floor,p.rpm*0.54);
    p.perfectFlash=0.55;p.shiftCooldown=base*0.7;
    p.speed*=(1+(p.perfectSpeedBonus||0));
    p.perfectCount++;
    if(p.perfNosBonus&&p.perfectCount%3===0)p.nosCharges++;
    if(p.cashPerPerfect>0){run.cash+=p.cashPerPerfect;flash(`+$${p.cashPerPerfect}`,C.yellow,0.7);}
  }else if(q==='good'){
    p.rpm=Math.max(MAX_RPM*floor,p.rpm*0.55);p.shiftCooldown=base;
  }else if(q==='early'){
    p.rpm=Math.max(MAX_RPM*floor,p.rpm*0.42);p.speed*=0.87;p.shiftCooldown=base*1.8;
  }else{
    p.rpm=MAX_RPM*0.62;p.speed*=0.91;p.shiftCooldown=base*1.5;
  }
  playShift(q==='perfect'?'perfect':q==='good'?'good':'bad');
}

function useNOS(){
  const p=player;
  if(!p.launched||p.nosDisabled||p.fogger)return;
  if(p.nosCharges>0&&!p.nosActive){p.nosCharges--;p.nosActive=true;p.nosFuel=p.nosDur;playNOS();}
}

function updateOpponent(dt){
  if(!race||race.state!=='go')return;
  const o=opponent;
  const prog=o.dist/RACE_DIST;
  const ramp=prog<0.08?prog*10:1;
  o.speed+=(ramp*295*o.baseSpeed-o.speed)*2.2*dt;
  o.speed=Math.max(0,o.speed);
  o.dist+=o.speed*dt;
  o.gearTimer+=dt;
  if(o.gearTimer>=o.gearInterval){o.gearTimer=0;o.gear=Math.min(6,o.gear+1);}
}

// ─── JUNKYARD ────────────────────────────────────────────────
function buildJunkyard(){
  // Weighted random pool
  const pool=[];
  PARTS.forEach(p=>{const w={common:70,uncommon:20,rare:8,legendary:2}[p.rarity]||10;for(let i=0;i<w;i++)pool.push(p);});
  jParts=[];
  const n=run.jSlots;
  for(let i=0;i<n;i++){
    const isGhost=run.driver.id==='ghost'&&i===0;
    let src;
    if(isGhost){const rares=PARTS.filter(p=>p.rarity==='rare'||p.rarity==='legendary');src=rares[Math.floor(Math.random()*rares.length)];}
    else src=pool[Math.floor(Math.random()*pool.length)];
    const cost=Math.max(1,src.cost-run.discount+(run.driver.id==='heiress'?1:0));
    jParts.push({...src,displayCost:cost});
  }
  // Garage upgrade
  const avail=GARAGE_UPGRADES.filter(u=>!run.upgrades.includes(u.id));
  jUpgrade=avail.length?avail[Math.floor(Math.random()*avail.length)]:null;
  jRerollCost=run.rerollBase||5;
  jCursor=0;jMode='buy';
}

function jReroll(){
  if(run.cash<jRerollCost){flash('NOT ENOUGH CASH',C.red);return;}
  run.cash-=jRerollCost++;
  buildJunkyard();
}

function jBuyPart(i){
  const p=jParts[i];if(!p)return;
  if(run.cash<p.displayCost){flash('NOT ENOUGH CASH',C.red);return;}
  const used=run.parts.filter(Boolean).length;
  const need=1+(p.extraSlots||0);
  if(used+need>run.partSlots){flash('NO PART SLOTS',C.red);return;}
  run.cash-=p.displayCost;
  if(p.id==='roll_cage')run.lives=Math.min(5,run.lives+1);
  run.parts.push({...p});
  jParts[i]=null;
  playCash();flash('INSTALLED: '+p.name,C.neon,1.5);
}

function jBuyUpgrade(){
  if(!jUpgrade)return;
  if(run.cash<jUpgrade.cost){flash('NOT ENOUGH CASH',C.red);return;}
  run.cash-=jUpgrade.cost;
  jUpgrade.apply(run);
  run.upgrades.push(jUpgrade.id);
  jUpgrade=null;
  playCash();flash('UPGRADE INSTALLED!',C.neon,1.5);
}

function jSellPart(i){
  const p=run.parts[i];if(!p)return;
  if(p.welded){flash('WELDED — CANNOT SELL',C.red);return;}
  const sv=Math.floor(p.cost*run.sellMult);
  run.cash+=sv;
  run.parts.splice(i,1);
  playCash();flash(`SOLD FOR $${sv}`,C.yellow,1.5);
}

function updateParticles(dt){particles=particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;return p.life>0;});}
function drawParticles(){

// ─── TRACK (SIDE-SCROLL, LEFT→RIGHT) ─────────────────────────
function drawTrack(playerDist){
  const pd=playerDist||0;
  const ty=TRACK_Y-TRACK_H/2;
  // Sky
  ctx.fillStyle='#070714';ctx.fillRect(0,0,W,ty);
  // Horizon haze
  const hg=ctx.createLinearGradient(0,ty-30,0,ty);
  hg.addColorStop(0,'rgba(255,80,0,0)');hg.addColorStop(1,'rgba(255,60,0,0.08)');
  ctx.fillStyle=hg;ctx.fillRect(0,ty-30,W,30);
  // Crowd bleachers
  const crows=['#551100','#113355','#224400','#664400','#552244'];
  for(let bx=0;bx<W;bx+=22){
    const ci=Math.floor((bx+trackOffset*0.12)/22);
    ctx.fillStyle=crows[Math.abs(ci*7+1)%crows.length];ctx.fillRect(bx,ty-34,22,17);
    ctx.fillStyle=crows[Math.abs(ci*5+3)%crows.length];ctx.fillRect(bx,ty-17,22,17);
  }
  // Track surface
  ctx.fillStyle='#1a1a24';ctx.fillRect(0,ty,W,TRACK_H);
  // Track texture (vertical seams scrolling right→left)
  ctx.strokeStyle='#1e1e2c';ctx.lineWidth=1;
  for(let x=(-(trackOffset|0)%50);x<W;x+=50){
    ctx.beginPath();ctx.moveTo(x,ty);ctx.lineTo(x,ty+TRACK_H);ctx.stroke();
  }
  // Center dashes
  ctx.strokeStyle='rgba(255,255,160,0.35)';ctx.lineWidth=2;
  ctx.setLineDash([28,18]);ctx.lineDashOffset=-(trackOffset|0);
  ctx.beginPath();ctx.moveTo(0,ty+TRACK_H/2);ctx.lineTo(W,ty+TRACK_H/2);ctx.stroke();
  ctx.setLineDash([]);
  // Barriers top & bottom
  const sw=44;
  for(let bx=(-(trackOffset|0)%(sw*2))-sw;bx<W+sw;bx+=sw){
    const even=Math.floor((bx+trackOffset)/sw)%2===0;
    ctx.fillStyle=even?'#cc2200':'#dddddd';ctx.fillRect(bx|0,ty-7,sw,7);
    ctx.fillStyle=even?'#dddddd':'#cc2200';ctx.fillRect(bx|0,ty+TRACK_H,sw,7);
  }
  // Ground
  ctx.fillStyle='#0d0d06';ctx.fillRect(0,ty+TRACK_H+7,W,H-(ty+TRACK_H+7));
  // Finish line — approaches from right
  const remaining=RACE_DIST-pd;
  const fx=PLAYER_X+remaining*0.3;
  if(fx>-20&&fx<W+60){
    const cw2=8,rows=Math.ceil(TRACK_H/cw2)+1;
    for(let r=0;r<rows;r++){
      ctx.fillStyle=r%2===0?'#fff':'#000';ctx.fillRect((fx)|0,(ty+r*cw2)|0,6,cw2);
      ctx.fillStyle=r%2===0?'#000':'#fff';ctx.fillRect((fx+6)|0,(ty+r*cw2)|0,6,cw2);
    }
    // Top checker
    for(let c=0;c<10;c++){ctx.fillStyle=(c)%2===0?'#fff':'#000';ctx.fillRect((fx-20+c*8)|0,(ty-7)|0,8,7);}
    if(fx<W)px('FINISH',fx+4,ty-18,10,C.yellow);
  }
}

// ─── CAR SPRITE (SIDE VIEW, FACING RIGHT) ────────────────────
function drawCar(cx,cy,color,color2,nosActive,perfectFlash,speed,shakeOk){
  const cw=72,ch=28;
  const bx=Math.floor(cx-cw/2),by=Math.floor(cy-ch);
  // Shake
  const shake=shakeOk&&speed>140&&frame%2===0;
  const dx=shake&&speed>200?(frame%6<3?1:-1):0;
  const dy=shake?(frame%4<2?1:-1):0;
  const rx=bx+dx,ry=by+dy;
  // Speed trail
  if(speed>80){
    const a=Math.min(0.18,(speed-80)/300);
    ctx.globalAlpha=a;ctx.fillStyle=color;ctx.fillRect(rx-24,ry,cw,ch);
    ctx.globalAlpha=a*0.5;ctx.fillRect(rx-42,ry+5,cw*.7,ch*.6);
    ctx.globalAlpha=1;
  }
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(rx+5,ry+ch+3,cw,5);
  // Body (lower slab)
  ctx.fillStyle=color;ctx.fillRect(rx,ry+10,cw,ch-10);
  // Cab / roof (shorter, set back — muscle car profile)
  ctx.fillStyle=color2;ctx.fillRect(rx+14,ry,cw-28,ch-2);
  // Windshield (front = right since L→R)
  ctx.fillStyle='rgba(140,210,255,0.85)';ctx.fillRect(rx+cw-20,ry+2,10,ch-12);
  // Rear window
  ctx.fillStyle='rgba(140,210,255,0.65)';ctx.fillRect(rx+14,ry+2,9,ch-12);
  // Hood scoop
  ctx.fillStyle=color2;ctx.fillRect(rx+cw-32,ry+6,14,5);
  // Headlights
  ctx.fillStyle='#fff8bb';ctx.fillRect(rx+cw-4,ry+12,4,5);
  ctx.fillStyle='rgba(255,248,187,0.4)';ctx.fillRect(rx+cw,ry+10,8,8);
  // Taillights
  ctx.fillStyle='#ff2200';ctx.fillRect(rx,ry+12,4,5);
  // Side stripe
  ctx.fillStyle=color2+'88';ctx.fillRect(rx+4,ry+ch-5,cw-8,3);
  // Wheels
  const wR=9,spinA=(frame*Math.max(0.06,speed*0.006))%(Math.PI*2);
  function wheel(wx,wy){
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(wx,wy,wR,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(wx,wy,wR*.55,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#666';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(wx+Math.cos(spinA)*wR*.9,wy+Math.sin(spinA)*wR*.9);
    ctx.lineTo(wx-Math.cos(spinA)*wR*.9,wy-Math.sin(spinA)*wR*.9);ctx.stroke();
    ctx.beginPath();ctx.moveTo(wx+Math.cos(spinA+1.57)*wR*.9,wy+Math.sin(spinA+1.57)*wR*.9);
    ctx.lineTo(wx-Math.cos(spinA+1.57)*wR*.9,wy-Math.sin(spinA+1.57)*wR*.9);ctx.stroke();
  }
  wheel(rx+14,ry+ch+wR-2);
  wheel(rx+cw-14,ry+ch+wR-2);
  // NOS flames (from rear = left side)
  if(nosActive){
    const fc=['#ff6600','#ffaa00','#ffff00'];
    for(let i=0;i<7;i++){
      ctx.fillStyle=fc[(i+Math.floor(frame/2))%fc.length];
      const fh=10+Math.random()*8;
      ctx.fillRect(rx-4-i*4,ry+12+i,4+i,fh-i);
    }
  }
  // Perfect glow outline
  if(perfectFlash>0&&Math.floor(Date.now()/80)%2===0){
    ctx.strokeStyle=C.neon;ctx.lineWidth=2;ctx.strokeRect(rx-3,ry-3,cw+6,ch+6);
  }
}

  rect(x,y,w,h,sel?'#0d0d28':'#080818',sel?rc:'#222',sel?2:1);
  if(!p){ctx.fillStyle='#111';ctx.fillRect(x,y,w,h);px('EMPTY SLOT',x+w/2,y+h/2+4,8,'#333','center');return;}
  if(sel){ctx.fillStyle=rc+'18';ctx.fillRect(x,y,w,h);}
  ctx.fillStyle=rc;ctx.fillRect(x,y,w,4);
  px(p.name,x+5,y+16,9,sel?rc:C.white);
  ctx.fillStyle=rc+'33';ctx.fillRect(x+4,y+20,w-8,12);
  px(p.cat,x+6,y+30,7,rc);
  // Desc word-wrap
  const words=p.desc.split(' ');let line='',ly=y+44;
  const cpl=Math.floor((w-10)/5.2);
  words.forEach(w2=>{
    if((line+w2).length>cpl){px(line,x+5,ly,7,'#88aacc');line=w2+' ';ly+=10;}
    else line+=w2+' ';
  });
  if(line)px(line,x+5,ly,7,'#88aacc');
}

  px('PREP',W/2,228,90,C.yellow,'center');

function drawDriverSelect(){
  ctx.fillStyle='#04040c';ctx.fillRect(0,0,W,H);

  px('── DRIVERS WANTED ── STREET RACING GAZETTE ──',W/2,22,11,'#886600','center');
  px('SELECT YOUR DRIVER',W/2,42,12,C.yellow,'center');
  const cols=3,cw=Math.floor((W-48)/cols),ch=168,sx=24,sy=58;
  DRIVERS.forEach((d,i)=>{
    const col=i%cols,row=Math.floor(i/cols);
    const dx=sx+col*cw+4,dy=sy+row*(ch+8);
    const sel=i===driverCursor;
    rect(dx,dy,cw-8,ch,sel?'#0a0a1a':'#060610',sel?d.color:'#1a1a2a',sel?2:1);
    if(sel){ctx.fillStyle=d.color+'12';ctx.fillRect(dx,dy,cw-8,ch);}
    // Silhouette
    ctx.fillStyle=d.color+(sel?'cc':'66');
    const fx=dx+(cw-8)/2,fy=dy+52;
    ctx.beginPath();ctx.arc(fx,fy-22,12,0,Math.PI*2);ctx.fill();
    ctx.fillRect(fx-8,fy-10,16,26);
    px(d.name,dx+4,dy+76,sel?11:10,sel?d.color:C.white);
    px(`SLOTS: ${d.slots}`,dx+4,dy+90,8,sel?C.cyan:'#555');
    // Desc wrap
    const words=d.desc.split(' ');let line='',ly=dy+103;
    words.forEach(w=>{if((line+w).length>Math.floor((cw-16)/5.2)){px(line,dx+4,ly,7,sel?'#aaa':'#444');line=w+' ';ly+=10;}else line+=w+' ';});
    if(line)px(line,dx+4,ly,7,sel?'#aaa':'#444');

    for(let s=0;s<d.slots;s++){ctx.strokeStyle=sel?d.color:'#333';ctx.lineWidth=1;ctx.strokeRect(dx+4+s*14,dy+ch-16,11,11);}
  });

}

function drawSprintPrompt(){
  ctx.fillStyle='#04040c';ctx.fillRect(0,0,W,H);
  px('SPRINT RACE',W/2,130,22,C.yellow,'center');
  px(`SERIES ${run.series} — 1/8 MILE`,W/2,158,13,C.white,'center');

    {label:'RACE IT',sub:'Win to earn $3',color:C.neon},
    {label:'SKIP IT',sub:'Take $8 bonus instead',color:C.yellow},

    const ox=W/2+(i===0?-180:40),oy=210;

    if(sel){ctx.fillStyle=opt.color+'18';ctx.fillRect(ox,oy,160,80);}
    if(sel)px('▶',ox-14,oy+48,12,opt.color);
    px(opt.label,ox+80,oy+36,14,sel?opt.color:C.white,'center');
    px(opt.sub,ox+80,oy+56,9,sel?'#ccc':'#555','center');
  });
  if(Math.floor(frame/28)%2===0)px('← → SELECT   ENTER CONFIRM',W/2,320,10,C.white,'center');
}

function drawCountdown(){
  drawTrack(player.dist);
  const carY=TRACK_Y-8;
  const ox=PLAYER_X+(opponent.dist-player.dist)*0.3;
  if(ox>PLAYER_X){
    drawCar(PLAYER_X,carY,player.color,player.color2,false,0,player.speed,true);
    drawCar(ox,carY,opponent.color,opponent.color2,false,0,opponent.speed,false);
  }else{
    drawCar(ox,carY,opponent.color,opponent.color2,false,0,opponent.speed,false);
    drawCar(PLAYER_X,carY,player.color,player.color2,false,0,player.speed,true);
  }
  drawHUD();
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);
  if(countdown>0){
    const sc=1+(1-Math.min(1,cdFlash))*1.3;
    ctx.save();ctx.translate(W/2,H/2-10);ctx.scale(sc,sc);px(String(countdown),0,28,82,C.yellow,'center');ctx.restore();
  }else{
    px('GO!',W/2,H/2+18,76,C.neon,'center');
  }
  if(getRaceType()==='boss'){
    const db=SERIES[run.series-1]?.boss;
    if(db){px(db.name,W/2,H/2+72,14,C.red,'center');px(db.desc,W/2,H/2+90,10,'#aaa','center');}
  }
}

function drawRacing(){
  drawTrack(player.dist);
  // Horizontal speed lines
  if(player.speed>80){
    const a=Math.min(0.16,(player.speed-80)/280);
    ctx.strokeStyle=`rgba(255,255,255,${a})`;ctx.lineWidth=1;
    for(let i=0;i<14;i++){
      const sx=((i*91+50)%(W-80))+40,sy=((frame*14+i*211)%(H+40))-20;
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx-20-(i*11%20),sy);ctx.stroke();
    }
  }
  const carY=TRACK_Y-8;
  const ox=PLAYER_X+(opponent.dist-player.dist)*0.3;
  drawParticles();
  if(ox>PLAYER_X){
    drawCar(PLAYER_X,carY,player.color,player.color2,player.nosActive,player.perfectFlash,player.speed,true);
    drawCar(ox,carY,opponent.color,opponent.color2,false,0,opponent.speed,false);
  }else{
    drawCar(ox,carY,opponent.color,opponent.color2,false,0,opponent.speed,false);
    drawCar(PLAYER_X,carY,player.color,player.color2,player.nosActive,player.perfectFlash,player.speed,true);
  }
  drawRPMGauge();
  drawHUD();
  drawPartsOverlay();
  if(player.perfectFlash>0){
    ctx.fillStyle=`rgba(57,255,20,${player.perfectFlash*0.18})`;ctx.fillRect(0,0,W,H);
    if(Math.floor(Date.now()/90)%2===0)px('PERFECT!',W/2,H/2-30,30,C.neon,'center');
  }
  if(player.overrevTimer>0&&Math.floor(frame/5)%2===0)px('OVERREV!',W/2,H*.44,24,C.red,'center');
  if(flashMsg.timer>0)px(flashMsg.text,W/2,H/2-25,22,flashMsg.color,'center');
}

function drawResult(){
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);
  drawTrack(player.dist);
  ctx.fillStyle='rgba(0,0,0,0.66)';ctx.fillRect(0,0,W,H);
  const won=raceResult==='win';
  const rt=getRaceType();
  px(won?'RACE WON!':'RACE LOST!',W/2,H/2-36,34,won?C.neon:C.red,'center');
  px(`TIME: ${raceTimer.toFixed(2)}s`,W/2,H/2+8,15,C.white,'center');
  px(`TOP SPEED: ${run.bestSpeed} MPH`,W/2,H/2+30,13,C.cyan,'center');
  if(won)px(`+$${rt==='sprint'?3:rt==='quarter'?5:8}`,W/2,H/2+52,13,C.yellow,'center');
  if(!won)px('♥'.repeat(run.lives),W/2,H/2+52,14,C.red,'center');
}

function drawJunkyard(){
  ctx.fillStyle='#050509';ctx.fillRect(0,0,W,H);
  // Grime texture (static, no per-frame random)
  ctx.fillStyle='rgba(40,20,0,0.15)';
  for(let i=0;i<120;i++){
    const gx=(i*233+17)%W,gy=(i*131+41)%H;
    ctx.fillRect(gx,gy,2,2);
  }
  px('THE JUNKYARD',W/2,20,15,C.orange,'center');
  px(`SERIES ${run.series} COMPLETE`,W/2,36,9,'#665500','center');
  px(`$${run.cash}`,W-10,20,13,C.yellow,'right');
  px(`${run.parts.filter(Boolean).length}/${run.partSlots} SLOTS`,W-10,34,9,'#aaa','right');
  px('♥'.repeat(run.lives),10,20,12,C.red);

  // Parts for sale
  const n=jParts.length;
  const hasUpg=!!jUpgrade;
  const totalCards=n+(hasUpg?1:0);
  const cardW=Math.min(148,Math.floor((W-24)/totalCards)-6);
  const cardH=140;
  const sy=46;

  if(jMode==='buy'){
    px('FOR SALE',12,44,10,C.yellow);
    jParts.forEach((p,i)=>{
      const cx=12+i*(cardW+5);
      drawPartCard(p,cx,sy,cardW,cardH,i===jCursor);
      if(p&&i===jCursor)px(`ENTER=BUY $${p.displayCost}`,cx+cardW/2,sy+cardH+14,9,C.neon,'center');
    });
    // Upgrade card
    if(hasUpg){
      const ux=12+n*(cardW+5);
      const sel=jCursor===n;
      rect(ux,sy,cardW,cardH,sel?'#0a100a':'#060a06',sel?C.neon:'#1a2a1a',sel?2:1);
      if(sel){ctx.fillStyle=C.neon+'12';ctx.fillRect(ux,sy,cardW,cardH);}
      ctx.fillStyle=C.neon;ctx.fillRect(ux,sy,cardW,4);
      px('GARAGE UPGRADE',ux+4,sy+16,7,sel?C.neon:C.white);
      px(jUpgrade.name,ux+4,sy+30,9,sel?C.yellow:C.white);
      px(jUpgrade.desc,ux+4,sy+46,7,'#88cc88');
      px(`$${jUpgrade.cost}`,ux+cardW-4,sy+cardH-10,11,C.yellow,'right');
      if(sel)px('ENTER=BUY',ux+cardW/2,sy+cardH+14,9,C.neon,'center');
    }
  }

  // Installed parts
  px(jMode==='sell'?'INSTALLED PARTS  [SELL MODE]':'INSTALLED PARTS',12,200,10,jMode==='sell'?C.red:C.cyan);
  const instN=run.partSlots;
  const ipw=Math.min(120,Math.floor((W-24)/Math.max(1,instN))-4);
  for(let i=0;i<instN;i++){
    const p=run.parts[i]||null;
    const ix=12+i*(ipw+4),iy=208;
    drawPartCard(p,ix,iy,ipw,100,jMode==='sell'&&i===jCursor);
    if(jMode==='sell'&&i===jCursor&&p){
      const sv=Math.floor(p.cost*run.sellMult);
      px(`ENTER=SELL $${sv}`,ix+ipw/2,iy+108,8,C.red,'center');
    }
  }

  // Footer controls
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,H-30,W,30);
  const modeLabel=jMode==='buy'?'[BUY]':'[SELL]';
  px(`${modeLabel} ←→ NAVIGATE   ENTER ${jMode==='buy'?'BUY':'SELL'}   TAB TOGGLE SELL   R REROLL($${jRerollCost})   SPACE DONE`,W/2,H-10,8,'#555','center');
  if(flashMsg.timer>0)px(flashMsg.text,W/2,H-44,13,flashMsg.color,'center');
}

function drawGameOver(){
  ctx.fillStyle='#080000';ctx.fillRect(0,0,W,H);
  if(Math.floor(frame/12)%2===0){ctx.fillStyle='rgba(255,0,0,0.06)';ctx.fillRect(0,0,W,H);}

function drawWin(){
  ctx.fillStyle='#001200';ctx.fillRect(0,0,W,H);
  if(Math.floor(frame/7)%2===0){ctx.fillStyle='rgba(57,255,20,0.06)';ctx.fillRect(0,0,W,H);}
  px('YOU',W/2,130,90,C.neon,'center');
  px('WIN!',W/2,218,90,C.yellow,'center');
  px('THE KING HAS BEEN DEFEATED',W/2,284,13,C.cyan,'center');
  px(`BEST SPEED: ${run.bestSpeed} MPH`,W/2,308,12,C.white,'center');
  const built=run.parts.filter(Boolean);
  if(built.length){px('FINAL BUILD:',W/2,336,10,C.yellow,'center');built.slice(0,8).forEach((p,i)=>px(p.name,W/2,352+i*15,9,'#888','center'));}
  if(Math.floor(frame/34)%2===0)px('SPACE TO PLAY AGAIN',W/2,H-28,13,C.white,'center');
}

// ─── INPUT ───────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  if(keys[e.code])return;
  keys[e.code]=true;
  initAudio();
  if(state==='menu'&&(e.code==='Space'||e.code==='Enter')){state='driver_select';driverCursor=0;}
  else if(state==='driver_select'){
    if(e.code==='ArrowRight'||e.code==='ArrowDown')driverCursor=(driverCursor+1)%DRIVERS.length;
    if(e.code==='ArrowLeft'||e.code==='ArrowUp')driverCursor=(driverCursor-1+DRIVERS.length)%DRIVERS.length;
    if(e.code==='Enter'||e.code==='Space'){initRun(DRIVERS[driverCursor].id);run.raceInSeries=1;doSprintRace();}
  }
  else if(state==='sprint_prompt'){
    if(e.code==='ArrowLeft'||e.code==='ArrowRight')sprintSkipCursor=1-sprintSkipCursor;
    if(e.code==='Enter'||e.code==='Space'){if(sprintSkipCursor===0)doSprintRace();else doSprintSkip();}
  }
  else if(state==='racing'){
    if(e.code==='Space')doShift();
    if(e.code==='KeyN')useNOS();
  }
  else if(state==='junkyard'){
    const maxBuy=jParts.length+(jUpgrade?1:0)-1;
    const maxSell=Math.max(0,run.parts.filter(Boolean).length-1);
    if(e.code==='Tab'){jMode=jMode==='buy'?'sell':'buy';jCursor=0;}
    if(e.code==='ArrowLeft')jCursor=Math.max(0,jCursor-1);
    if(e.code==='ArrowRight')jCursor=Math.min(jMode==='buy'?maxBuy:maxSell,jCursor+1);
    if(e.code==='Enter'){
      if(jMode==='buy'){
        if(jCursor<jParts.length)jBuyPart(jCursor);
        else jBuyUpgrade();
      }else{
        jSellPart(jCursor);
      }
    }
    if(e.code==='KeyR')jReroll();
    if(e.code==='Space'){run.raceInSeries=1;setupRace();}
  }
  else if(state==='gameover'||state==='win'){
    if(e.code==='Space'||e.code==='Enter')state='menu';
  }
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
window.addEventListener('keydown',e=>{if(e.code==='Space')e.preventDefault();},{passive:false});

// ─── MAIN LOOP ────────────────────────────────────────────────
function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,0.05);
  lastTs=ts;frame++;
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);
  if(flashMsg.timer>0)flashMsg.timer-=dt;

  switch(state){
    case 'menu':
      trackOffset=(frame*1.4)%1200;
      stopMusic();drawMenu();
      break;
    case 'driver_select':
      drawDriverSelect();
      break;
    case 'sprint_prompt':
      drawSprintPrompt();
      break;
    case 'countdown':{
      cdFlash+=dt;cdTimer-=dt;trackOffset+=18*dt;
      if(cdTimer<=0){
        countdown--;
        if(countdown>0){cdTimer=1;cdFlash=0;playCountBeep(false);}
        else if(countdown===0){cdTimer=0.88;cdFlash=0;playCountBeep(true);}
        else{
          race.state='go';player.launched=true;
          player.rpm=3200*player.launchBoost;player.speed=22*player.launchBoost;
          if(opponent.headStart>0){opponent.dist=opponent.baseSpeed*opponent.headStart*240;}
          state='racing';playMusic();
        }
      }
      drawCountdown();
      break;
    }
    case 'racing':{
      updatePlayer(dt);updateOpponent(dt);updateParticles(dt);
      raceTimer+=dt;trackOffset+=player.speed*0.3*dt;
      if(!race.finishPlayer&&player.dist>=RACE_DIST)race.finishPlayer=raceTimer;
      if(!race.finishOpponent&&opponent.dist>=RACE_DIST)race.finishOpponent=raceTimer;
      const bothDone=race.finishPlayer!==null&&race.finishOpponent!==null;
      const oppFar=race.finishOpponent!==null&&(opponent.dist-player.dist>120);
      if(bothDone||(race.finishPlayer!==null&&!race.finishOpponent)||oppFar)endRace();
      drawRacing();
      break;
    }
    case 'result':{
      resultTimer-=dt;trackOffset+=8*dt;
      drawResult();
      if(resultTimer<=0)afterResult();
      break;
    }
    case 'junkyard':
      drawJunkyard();
      break;
    case 'gameover':
      drawGameOver();
      break;
    case 'win':
      drawWin();
      break;
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
